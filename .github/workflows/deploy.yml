name: Deploy to Azure

on:
  push:
    branches: [main]
    paths-ignore: ['infra/**']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
  PYTHON_VERSION: '3.11'

jobs:
  deploy-function:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r function_app/requirements.txt --target function_app/.python_packages/lib/site-packages

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: function_app

  deploy-web:
    runs-on: ubuntu-latest
    environment: production
    env:
      AZURE_FUNCTIONAPP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Stamp version with git SHA
        run: echo '{"version":"${{ github.sha }}"}' > web/version.json

      - name: Deploy web to blob storage
        run: |
          STORAGE_ACCOUNT="${AZURE_FUNCTIONAPP_NAME/-func/}st"
          STORAGE_ACCOUNT="${STORAGE_ACCOUNT//-/}"

          # Upload HTML files
          az storage blob upload-batch \
            --account-name "$STORAGE_ACCOUNT" \
            --destination '$web' \
            --source web/ \
            --overwrite \
            --content-type "text/html; charset=utf-8" \
            --pattern "*.html" \
            --auth-mode login

          # Upload JS files with correct MIME type
          az storage blob upload-batch \
            --account-name "$STORAGE_ACCOUNT" \
            --destination '$web' \
            --source web/ \
            --overwrite \
            --content-type "application/javascript; charset=utf-8" \
            --pattern "*.js" \
            --auth-mode login

          # Upload version.json LAST (after HTML/JS) so clients don't
          # see a new version before the new code is deployed.
          az storage blob upload \
            --account-name "$STORAGE_ACCOUNT" \
            --container-name '$web' \
            --file web/version.json \
            --name version.json \
            --overwrite \
            --content-type "application/json; charset=utf-8" \
            --auth-mode login

          # Upload ai-config.json for App Insights client SDK
          az storage blob upload \
            --account-name "$STORAGE_ACCOUNT" \
            --container-name '$web' \
            --file web/ai-config.json \
            --name ai-config.json \
            --overwrite \
            --content-type "application/json; charset=utf-8" \
            --auth-mode login
