<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>התראות פיקוד העורף</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  transition: background-color 0.5s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
}

/* --- Session warning banner --- */
#session-banner {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 0.8em 1em;
  background: rgba(255, 152, 0, 0.9);
  color: #fff;
  text-align: center;
  font-size: clamp(0.7rem, 1.8vmin, 2vw);
  z-index: 100;
  cursor: pointer;
}

/* --- Connection / stale warning --- */
#conn-warning {
  display: none;
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  padding: 0.5em 1.2em;
  background: rgba(0, 0, 0, 0.7);
  color: #ffab00;
  border-radius: 0 0 8px 8px;
  font-size: clamp(0.7rem, 1.6vmin, 2vw);
  z-index: 90;
  white-space: nowrap;
}

/* --- Center content --- */
#center {
  text-align: center;
  user-select: none;
}

#status-text {
  font-size: clamp(2rem, 8vmin, 10vw);
  font-weight: 700;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  margin-bottom: 0.2em;
}

#clock {
  direction: ltr;
  unicode-bidi: isolate;
  font-variant-numeric: tabular-nums;
  font-weight: 300;
  text-shadow: 0 1px 4px rgba(0,0,0,0.25);
}

#clock-main {
  font-size: clamp(1.5rem, 6vmin, 7vw);
}

#clock-seconds {
  font-size: clamp(0.8rem, 3vmin, 3.5vw);
  opacity: 0.7;
}

/* --- City label (lower-left visually) --- */
#city-label {
  position: fixed;
  bottom: 2vh;
  left: 2vw;
  background: rgba(0, 0, 0, 0.2);
  padding: 0.3em 0.8em;
  border-radius: 6px;
  font-size: clamp(1rem, 2.5vmin, 3vw);
  direction: rtl;
  user-select: none;
}

/* --- Event log (lower-right visually) --- */
#event-log {
  position: fixed;
  bottom: 2vh;
  right: 2vw;
  background: rgba(0, 0, 0, 0.25);
  padding: 0.5em 0.7em;
  border-radius: 6px;
  font-size: clamp(0.6rem, 1.2vmin, 1.5vw);
  direction: rtl;
  max-width: 40vw;
  user-select: none;
  font-variant-numeric: tabular-nums;
}

#event-log .ev {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0.15em 0;
}

.dot {
  display: inline-block;
  width: 0.6em;
  height: 0.6em;
  border-radius: 50%;
  margin-inline-end: 0.3em;
  vertical-align: middle;
}

.dot-red    { background: #d50000; }
.dot-yellow { background: #f9a825; }
.dot-yellow_orange { background: #ffab00; }
.dot-green  { background: #00c853; }
.dot-gray   { background: #9e9e9e; }

.ev-time {
  direction: ltr;
  unicode-bidi: isolate;
  opacity: 0.7;
  margin-inline-end: 0.4em;
}

/* --- No-city prompt --- */
#no-city {
  display: none;
  text-align: center;
  padding: 2em;
}

#no-city h1 {
  font-size: clamp(1.5rem, 5vmin, 6vw);
  margin-bottom: 0.5em;
}

#no-city p {
  font-size: clamp(1rem, 2.5vmin, 3vw);
  margin-bottom: 0.3em;
  opacity: 0.85;
}

#no-city a {
  color: #fff;
  text-decoration: underline;
  font-size: clamp(1rem, 2.5vmin, 3vw);
}

/* --- Session expired overlay --- */
#expired-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: #212121;
  color: #fff;
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  cursor: pointer;
}

#expired-overlay h1 {
  font-size: clamp(1.5rem, 5vmin, 6vw);
  margin-bottom: 0.5em;
}

#expired-overlay p {
  font-size: clamp(1rem, 2.5vmin, 3vw);
  opacity: 0.7;
}

/* --- Missed-us explanation --- */
#missed-us-info {
  display: none;
  font-size: clamp(0.65rem, 1.6vmin, 2vw);
  opacity: 0.85;
  margin-top: 0.5em;
  text-shadow: 0 1px 4px rgba(0,0,0,0.25);
  max-width: min(600px, 80vw);
  line-height: 1.5;
}
#missed-us-info .mu-detail {
  opacity: 0.7;
  font-size: 0.9em;
  margin-top: 0.3em;
}
/* --- Pre-alert "as soon as" info --- */
#pre-alert-info {
  display: none;
  font-size: clamp(0.6rem, 1.4vmin, 1.8vw);
  opacity: 0.8;
  margin-top: 0.5em;
  text-shadow: 0 1px 4px rgba(0,0,0,0.25);
  max-width: min(600px, 80vw);
  line-height: 1.5;
}

/* --- City input bar --- */
#city-form {
  margin-top: 1.5em;
  display: flex;
  justify-content: center;
  gap: 0.5em;
  position: relative;
}
#city-input-wrap {
  position: relative;
  width: min(300px, 60vw);
}
#city-input {
  font-size: clamp(1rem, 2.5vmin, 3vw);
  padding: 0.4em 0.8em;
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 8px;
  background: rgba(255,255,255,0.15);
  color: #fff;
  direction: rtl;
  outline: none;
  width: 100%;
}
#city-input::placeholder { color: rgba(255,255,255,0.5); }
#city-input:focus { border-color: #fff; }
#city-input.invalid { border-color: #ff5252; }
#city-suggestions {
  display: none;
  position: absolute;
  top: 100%;
  right: 0;
  left: 0;
  background: #333;
  border-radius: 0 0 8px 8px;
  max-height: 40vh;
  overflow-y: auto;
  z-index: 60;
  direction: rtl;
}
#city-suggestions .sug {
  padding: 0.5em 0.8em;
  cursor: pointer;
  font-size: clamp(0.85rem, 2vmin, 2.5vw);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
#city-suggestions .sug:hover,
#city-suggestions .sug.active { background: rgba(255,255,255,0.15); }
#city-error {
  display: none;
  color: #ff5252;
  margin-top: 0.5em;
  font-size: clamp(0.8rem, 2vmin, 2.5vw);
}
#city-go {
  font-size: clamp(1rem, 2.5vmin, 3vw);
  padding: 0.4em 1em;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.3);
  color: #fff;
  cursor: pointer;
  align-self: flex-start;
}
#city-go:hover { background: rgba(255,255,255,0.5); }

/* --- Location button --- */
#locate-btn {
  display: none;
  margin-top: 1.2em;
  padding: 0.5em 1.2em;
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  color: #fff;
  font-size: clamp(0.9rem, 2.2vmin, 2.5vw);
  cursor: pointer;
  transition: background 0.2s;
}
#locate-btn:hover { background: rgba(255,255,255,0.25); }
#locate-btn:disabled { opacity: 0.5; cursor: wait; }
#locate-error {
  display: none;
  color: #ffab00;
  margin-top: 0.5em;
  font-size: clamp(0.75rem, 1.8vmin, 2vw);
}

/* --- Invalid city banner --- */
#invalid-city {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 0.8em 1em;
  background: rgba(255, 82, 82, 0.9);
  color: #fff;
  text-align: center;
  font-size: clamp(0.7rem, 1.8vmin, 2vw);
  z-index: 100;
}
</style>
</head>
<body>

<div id="session-banner">⚠ תוקף הפעלה יפוג מחר — לחצו בכל מקום כדי להאריך</div>
<div id="conn-warning"></div>
<div id="invalid-city"></div>

<div id="center">
  <div id="status-text"></div>
  <div id="missed-us-info"></div>
  <div id="pre-alert-info"></div>
  <div id="clock"><span id="clock-main"></span><span id="clock-seconds"></span></div>
</div>

<div id="city-label"></div>
<div id="event-log"></div>

<div id="no-city">
  <h1>הזינו שם עיר</h1>
  <form id="city-form" onsubmit="return false;">
    <div id="city-input-wrap">
      <input id="city-input" type="text" placeholder="לדוגמה: בית שמש" autocomplete="off" />
      <div id="city-suggestions"></div>
    </div>
    <button id="city-go" type="submit">&#x25B6;</button>
  </form>
  <div id="city-error">עיר לא נמצאה במערכת</div>
  <button id="locate-btn" type="button">📍 השתמש במיקום שלי</button>
  <div id="locate-error"></div>
  <p dir="ltr" style="direction:ltr; margin-top:1em; opacity:0.6">or add <code>?city=YourCity</code> to the URL</p>
</div>

<div id="expired-overlay">
  <h1>הפעלה פגה — לחצו לטעינה מחדש</h1>
  <p>Session expired — tap to reload</p>
</div>

<script type="module">
import * as engine from "./alert-engine.js";

(function () {
  "use strict";

  // ── UI-only constants ─────────────────────────────────────
  var POLL_INTERVAL = 5000;
  var SESSION_MAX_MS = 7 * 24 * 60 * 60 * 1000;
  var SESSION_WARN_MS = 6 * 24 * 60 * 60 * 1000;
  var LS_KEY = "oref_lastActivity";

  // ── DOM refs ───────────────────────────────────────────────
  var elBody = document.body;
  var elCenter = document.getElementById("center");
  var elStatus = document.getElementById("status-text");
  var elMissedUsInfo = document.getElementById("missed-us-info");
  var elPreAlertInfo = document.getElementById("pre-alert-info");
  var elClockMain = document.getElementById("clock-main");
  var elClockSec = document.getElementById("clock-seconds");
  var elCityLabel = document.getElementById("city-label");
  var elEventLog = document.getElementById("event-log");
  var elNoCity = document.getElementById("no-city");
  var elConnWarn = document.getElementById("conn-warning");
  var elBanner = document.getElementById("session-banner");
  var elExpired = document.getElementById("expired-overlay");

  // ── State ──────────────────────────────────────────────────
  var city = "";
  var es = engine.createState(); // engine state
  var failCount = 0;
  var pollTimer = null;
  var sessionExpired = false;
  var lastThresholdFetch = 0;
  var knownCities = null;

  // ── Parse city from query string ───────────────────────────
  function getCity() {
    var params = new URLSearchParams(window.location.search);
    return (params.get("city") || "").trim();
  }

  function getMissedUsOverride() {
    var params = new URLSearchParams(window.location.search);
    var v = params.get("missedus");
    return v ? parseInt(v, 10) : null;
  }


  // Function app URL for API calls that need server-side processing
  var FUNC_API = "https://orefalert-func.azurewebsites.net/api";

  function fetchThresholds() {
    fetch("/api/thresholds.json")
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (!data) return;
        // Ignore stale thresholds (>2 days old)
        if (data.updated) {
          var age = Date.now() - new Date(data.updated).getTime();
          if (age > 2 * 24 * 60 * 60 * 1000) {
            es.stableThresholdMs = null;
            lastThresholdFetch = Date.now();
            return;
          }
        }
        es.thresholdsData = data;
        var override = getMissedUsOverride();
        if (override !== null) {
          es.stableThresholdMs = override * 1000;
        } else if (data.cities && data.cities[city]) {
          es.stableThresholdMs = data.cities[city].stable_seconds * 1000;
        } else {
          es.stableThresholdMs = null;
        }
        lastThresholdFetch = Date.now();
        // Re-render info panels if thresholds arrived while already displaying a color
        if (currentColor) {
          var saved = currentColor;
          currentColor = null;
          applyColor(saved);
        }
      })
      .catch(function() { /* ignore */ });
  }

  // ── Event log rendering ─────────────────────────────────────

  function renderEventLog() {
    var html = "";
    for (var i = 0; i < es.eventLog.length; i++) {
      var ev = es.eventLog[i];
      html += '<div class="ev">' +
        '<span class="dot dot-' + ev.dotColor + '"></span>' +
        '<span class="ev-time">' + (ev.time || "") + '</span>' +
        escapeHtml(ev.title) +
        '</div>';
    }
    elEventLog.innerHTML = html;
  }

  function escapeHtml(s) {
    var d = document.createElement("div");
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  // ── UI rendering ───────────────────────────────────────────

  var COLOR_MAP = {
    green:  { bg: "#00c853", label: "\u05D4\u05DB\u05DC \u05EA\u05E7\u05D9\u05DF" },        // הכל תקין
    yellow: { bg: "#f9a825", label: "\u05D4\u05EA\u05E8\u05D0\u05D4 \u05DE\u05D5\u05E7\u05D3\u05DE\u05EA" }, // התראה מוקדמת
    yellow_orange: { bg: "#ffab00", label: "\u05DB\u05E0\u05E8\u05D0\u05D4 \u05E2\u05D1\u05E8" }, // כנראה עבר
    red:    { bg: "#d50000", label: "!\u05D0\u05D6\u05E2\u05E7\u05D4" }                      // !אזעקה
  };

  var currentColor = null;

  function applyColor(color) {
    if (color === currentColor) return;
    currentColor = color;
    var info = COLOR_MAP[color];
    elBody.style.backgroundColor = info.bg;
    elStatus.textContent = info.label;
    // Show missed-us explanation only in yellow_orange state
    if (color === "yellow_orange") {
      var threshSec = Math.round(es.stableThresholdMs / 1000);
      var threshMin = threshSec >= 60 ? Math.floor(threshSec / 60) + ":" + String(threshSec % 60).padStart(2, "0") : threshSec + " \u05E9\u05E0\u05D9\u05D5\u05EA";
      var html = "\u05E2\u05E8\u05D9\u05DD \u05D0\u05D7\u05E8\u05D5\u05EA \u05D1\u05D0\u05D5\u05EA\u05D4 " +
        "\u05D4\u05EA\u05E8\u05E2\u05D4 \u05E7\u05D9\u05D1\u05DC\u05D5 \u05D0\u05D6\u05E2\u05E7\u05D5\u05EA, " +
        "\u05D0\u05DA " + city + " \u05DC\u05D0 \u05E7\u05D9\u05D1\u05DC\u05D4 \u05D1\u05DE\u05E9\u05DA " +
        threshMin + " \u05DE\u05D4\u05D0\u05D6\u05E2\u05E7\u05D4 \u05D4\u05E8\u05D0\u05E9\u05D5\u05E0\u05D4.";
      // ערים אחרות באותה התרעה קיבלו אזעקות, אך [city] לא קיבלה במשך N מהאזעקה הראשונה.
      var ci = es.thresholdsData && es.thresholdsData.cities && es.thresholdsData.cities[city];
      html += '<div class="mu-detail">';
      if (ci) {
        var accuracy = ((1 - ci.fn_rate) * 100).toFixed(0);
        html += "\u05E1\u05E3 " + city + ": " + threshSec + " \u05E9\u05E0\u05D9\u05D5\u05EA " +
          "(" + ci.events + " \u05D0\u05D9\u05E8\u05D5\u05E2\u05D9\u05DD \u05D4\u05D9\u05E1\u05D8\u05D5\u05E8\u05D9\u05D9\u05DD, " +
          accuracy + "% \u05D3\u05D9\u05D5\u05E7)";
        // סף [city]: N שניות (M אירועים היסטוריים, X% דיוק)
        html += "<br>";
      }
      html += "Other cities in the same alert received sirens, but " + escapeHtml(city) +
        " did not within " + threshSec + "s of the first siren. ";
      html += "The " + threshSec + "s threshold for " + escapeHtml(city) +
        " is calibrated from historical data so this indication is correct at least 95% of the time.";
      html += "</div>";
      elMissedUsInfo.innerHTML = html;
      elMissedUsInfo.style.display = "block";
      elPreAlertInfo.style.display = "none";
    } else if (color === "yellow") {
      elMissedUsInfo.style.display = "none";
      // Show "as soon as" siren timing on pre-alert
      var ci = es.thresholdsData && es.thresholdsData.cities && es.thresholdsData.cities[city];
      if (ci && ci.earliest_siren_seconds != null && es.currentRecord && es.currentRecord.time) {
        var earliestSec = ci.earliest_siren_seconds;
        var preAlertMs = es.currentRecord.time * 1000;
        var expectedMs = preAlertMs + earliestSec * 1000;
        var expectedDate = new Date(expectedMs);
        var timeStr = String(expectedDate.getHours()).padStart(2, "0") + ":" +
          String(expectedDate.getMinutes()).padStart(2, "0");
        var minPart = Math.floor(earliestSec / 60);
        var secPart = Math.round(earliestSec % 60);
        var durationStr = minPart > 0
          ? minPart + " \u05D3\u05E7\u05D5\u05EA" + (secPart > 0 ? " \u05D5-" + secPart + " \u05E9\u05E0\u05D9\u05D5\u05EA" : "")
          : Math.round(earliestSec) + " \u05E9\u05E0\u05D9\u05D5\u05EA";
        // היסטורית, אזעקות ב[city] מגיעות כבר אחרי X דקות מההתראה (≈HH:MM)
        elPreAlertInfo.innerHTML =
          "\u05D4\u05D9\u05E1\u05D8\u05D5\u05E8\u05D9\u05EA, \u05D0\u05D6\u05E2\u05E7\u05D5\u05EA \u05D1" +
          escapeHtml(city) + " \u05DE\u05D2\u05D9\u05E2\u05D5\u05EA \u05DB\u05D1\u05E8 \u05D0\u05D7\u05E8\u05D9 " +
          durationStr + " \u05DE\u05D4\u05D4\u05EA\u05E8\u05E2\u05D4" +
          " (\u2248" + timeStr + ")";
        elPreAlertInfo.style.display = "block";
      } else {
        elPreAlertInfo.style.display = "none";
      }
    } else {
      elMissedUsInfo.style.display = "none";
      elPreAlertInfo.style.display = "none";
    }
  }

  function updateClock() {
    var now = new Date();
    var hh = String(now.getHours()).padStart(2, "0");
    var mm = String(now.getMinutes()).padStart(2, "0");
    var ss = String(now.getSeconds()).padStart(2, "0");
    elClockMain.textContent = hh + ":" + mm;
    elClockSec.textContent = ":" + ss;
  }

  // ── Polling & processing ───────────────────────────────────

  function processState(state) {
    failCount = 0;
    var nowMs = Date.now();

    // Delegate to engine
    var result = engine.processState(state, es, city, nowMs);

    // Apply staleness warning
    if (result.staleWarning) {
      showWarning(result.staleWarning);
    } else {
      hideWarning();
    }

    // Add timestamps to new events for display
    var now = new Date();
    var hh = String(now.getHours()).padStart(2, "0");
    var mm = String(now.getMinutes()).padStart(2, "0");
    for (var e = 0; e < es.eventLog.length; e++) {
      if (!es.eventLog[e].time) {
        es.eventLog[e].time = hh + ":" + mm;
      }
    }

    // Update UI
    renderEventLog();
    applyColor(result.color);
  }

  function poll() {
    if (sessionExpired) return;

    // Re-fetch thresholds every 24h
    if (Date.now() - lastThresholdFetch > 24 * 60 * 60 * 1000) {
      fetchThresholds();
    }

    fetch("/api/state.json")
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (data) {
        processState(data);
      })
      .catch(function () {
        failCount++;
        if (failCount >= 3) {
          showWarning("\u26A0 \u05D0\u05D9\u05DF \u05D7\u05D9\u05D1\u05D5\u05E8"); // ⚠ אין חיבור
        }
      });
  }

  function showWarning(msg) {
    elConnWarn.textContent = msg;
    elConnWarn.style.display = "block";
  }

  function hideWarning() {
    elConnWarn.style.display = "none";
  }

  // ── Session timeout ────────────────────────────────────────

  function resetActivity() {
    try { localStorage.setItem(LS_KEY, String(Date.now())); } catch (e) {}
  }

  function getLastActivity() {
    try {
      var v = localStorage.getItem(LS_KEY);
      return v ? parseInt(v, 10) : Date.now();
    } catch (e) { return Date.now(); }
  }

  function checkSession() {
    if (sessionExpired) return;
    var elapsed = Date.now() - getLastActivity();

    if (elapsed >= SESSION_MAX_MS) {
      sessionExpired = true;
      if (pollTimer) clearInterval(pollTimer);
      elExpired.style.display = "flex";
      elExpired.addEventListener("click", function () { location.reload(); });
      return;
    }

    if (elapsed >= SESSION_WARN_MS) {
      elBanner.style.display = "block";
    } else {
      elBanner.style.display = "none";
    }
  }

  // ── Init ───────────────────────────────────────────────────

  function init() {
    city = getCity();

    if (!city) {
      elBody.style.backgroundColor = "#424242";
      elCenter.style.display = "none";
      elCityLabel.style.display = "none";
      elEventLog.style.display = "none";
      elNoCity.style.display = "block";

      var cityForm = document.getElementById("city-form");
      var cityInput = document.getElementById("city-input");
      var citySugg = document.getElementById("city-suggestions");
      var cityError = document.getElementById("city-error");
      var activeIdx = -1;

      // Fetch city list for autocomplete
      fetch("/api/cities.json")
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) { if (data) knownCities = data; })
        .catch(function() {});

      function showSuggestions(matches) {
        if (!matches.length) { citySugg.style.display = "none"; activeIdx = -1; return; }
        var html = "";
        for (var i = 0; i < Math.min(matches.length, 8); i++) {
          html += '<div class="sug" data-city="' + escapeHtml(matches[i]) + '">' + escapeHtml(matches[i]) + '</div>';
        }
        citySugg.innerHTML = html;
        citySugg.style.display = "block";
        activeIdx = -1;
      }

      function selectCity(name) {
        cityInput.value = name;
        citySugg.style.display = "none";
        cityError.style.display = "none";
        cityInput.classList.remove("invalid");
      }

      if (cityInput) {
        cityInput.addEventListener("input", function() {
          cityError.style.display = "none";
          cityInput.classList.remove("invalid");
          var val = cityInput.value.trim();
          if (!val || !knownCities) { citySugg.style.display = "none"; return; }
          var matches = knownCities.filter(function(c) { return c.indexOf(val) !== -1; });
          showSuggestions(matches);
        });

        cityInput.addEventListener("keydown", function(e) {
          var items = citySugg.querySelectorAll(".sug");
          if (!items.length) return;
          if (e.key === "ArrowDown") { e.preventDefault(); activeIdx = Math.min(activeIdx + 1, items.length - 1); }
          else if (e.key === "ArrowUp") { e.preventDefault(); activeIdx = Math.max(activeIdx - 1, 0); }
          else if (e.key === "Enter" && activeIdx >= 0) { e.preventDefault(); selectCity(items[activeIdx].dataset.city); return; }
          else return;
          for (var i = 0; i < items.length; i++) items[i].classList.toggle("active", i === activeIdx);
        });

        citySugg.addEventListener("click", function(e) {
          var el = e.target.closest(".sug");
          if (el) selectCity(el.dataset.city);
        });

        document.addEventListener("click", function(e) {
          if (!citySugg.contains(e.target) && e.target !== cityInput) citySugg.style.display = "none";
        });

        cityInput.focus();
      }

      if (cityForm) {
        cityForm.addEventListener("submit", function(e) {
          e.preventDefault();
          var val = cityInput.value.trim();
          if (!val) return;
          if (knownCities && knownCities.indexOf(val) === -1) {
            cityInput.classList.add("invalid");
            cityError.style.display = "block";
            return;
          }
          window.location.search = "?city=" + encodeURIComponent(val);
        });
      }

      // ── Geolocation: "Use my location" button ──────────────
      var locateBtn = document.getElementById("locate-btn");
      var locateError = document.getElementById("locate-error");

      if (navigator.geolocation && locateBtn) {
        locateBtn.style.display = "inline-block";

        locateBtn.addEventListener("click", function() {
          locateBtn.disabled = true;
          locateBtn.textContent = "📍 מאתר...";
          locateError.style.display = "none";

          navigator.geolocation.getCurrentPosition(
            function onSuccess(pos) {
              var myLat = pos.coords.latitude;
              var myLng = pos.coords.longitude;
              fetch("/api/cities-geo.json")
                .then(function(r) {
                  if (!r.ok) throw new Error("HTTP " + r.status);
                  return r.json();
                })
                .then(function(cities) {
                  // Find nearest city by Euclidean approximation (accurate enough for Israel's scale)
                  var best = null;
                  var bestDist = Infinity;
                  for (var i = 0; i < cities.length; i++) {
                    var dLat = cities[i].lat - myLat;
                    var dLng = cities[i].lng - myLng;
                    var dist = dLat * dLat + dLng * dLng;
                    if (dist < bestDist) {
                      bestDist = dist;
                      best = cities[i].name;
                    }
                  }
                  if (best) {
                    window.location.search = "?city=" + encodeURIComponent(best);
                  } else {
                    showLocateError("לא נמצאה עיר קרובה");
                  }
                })
                .catch(function() {
                  showLocateError("שגיאה בטעינת נתוני ערים");
                });
            },
            function onError(err) {
              if (err.code === 1) {
                showLocateError("הגישה למיקום נדחתה");
              } else if (err.code === 2) {
                showLocateError("לא ניתן לקבוע מיקום");
              } else {
                showLocateError("זמן המתנה למיקום חלף");
              }
            },
            { enableHighAccuracy: false, timeout: 10000, maximumAge: 300000 }
          );

          function showLocateError(msg) {
            locateBtn.disabled = false;
            locateBtn.textContent = "📍 השתמש במיקום שלי";
            locateError.textContent = msg;
            locateError.style.display = "block";
          }
        });
      }

      return;
    }

    // Show city label
    elCityLabel.textContent = city;

    // Validate city against known list and show warning if invalid
    fetch("/api/cities.json")
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (data && data.indexOf(city) === -1) {
          var elInvalid = document.getElementById("invalid-city");
          elInvalid.textContent = "\u26A0 \u0022" + city + "\u0022 \u05DC\u05D0 \u05E0\u05DE\u05E6\u05D0\u05D4 \u05D1\u05E8\u05E9\u05D9\u05DE\u05EA \u05D4\u05E2\u05E8\u05D9\u05DD";
          // ⚠ "city" לא נמצאה ברשימת הערים
          elInvalid.style.display = "block";
        }
      })
      .catch(function() {});

    // Fetch thresholds (precomputed for all cities)
    fetchThresholds();

    // Initial color
    applyColor("green");

    // Clock
    updateClock();
    setInterval(updateClock, 1000);

    // Session management
    resetActivity();
    ["click", "touchstart", "keypress"].forEach(function (evt) {
      document.addEventListener(evt, resetActivity, { passive: true });
    });
    setInterval(checkSession, 60000);

    // Start polling — first poll also rebuilds recent history
    poll();
    pollTimer = setInterval(poll, POLL_INTERVAL);
  }

  init();
})();
</script>
</body>
</html>
