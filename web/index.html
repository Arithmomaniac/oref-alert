<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>התראות פיקוד העורף</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  transition: background-color 0.5s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
}

/* --- Session warning banner --- */
#session-banner {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 0.8em 1em;
  background: rgba(255, 152, 0, 0.9);
  color: #fff;
  text-align: center;
  font-size: clamp(0.7rem, 1.8vmin, 2vw);
  z-index: 100;
  cursor: pointer;
}

/* --- Connection / stale warning --- */
#conn-warning {
  display: none;
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  padding: 0.5em 1.2em;
  background: rgba(0, 0, 0, 0.7);
  color: #ffab00;
  border-radius: 0 0 8px 8px;
  font-size: clamp(0.7rem, 1.6vmin, 2vw);
  z-index: 90;
  white-space: nowrap;
}

/* --- Center content --- */
#center {
  text-align: center;
  user-select: none;
}

#status-text {
  font-size: clamp(2rem, 8vmin, 10vw);
  font-weight: 700;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  margin-bottom: 0.2em;
}

#clock {
  direction: ltr;
  unicode-bidi: isolate;
  font-variant-numeric: tabular-nums;
  font-weight: 300;
  text-shadow: 0 1px 4px rgba(0,0,0,0.25);
}

#clock-main {
  font-size: clamp(1.5rem, 6vmin, 7vw);
}

#clock-seconds {
  font-size: clamp(0.8rem, 3vmin, 3.5vw);
  opacity: 0.7;
}

/* --- City label (lower-left visually) --- */
#city-label {
  position: fixed;
  bottom: 2vh;
  left: 2vw;
  background: rgba(0, 0, 0, 0.2);
  padding: 0.3em 0.8em;
  border-radius: 6px;
  font-size: clamp(1rem, 2.5vmin, 3vw);
  direction: rtl;
  user-select: none;
}

/* --- Event log (lower-right visually) --- */
#event-log {
  position: fixed;
  bottom: 2vh;
  right: 2vw;
  background: rgba(0, 0, 0, 0.25);
  padding: 0.5em 0.7em;
  border-radius: 6px;
  font-size: clamp(0.6rem, 1.2vmin, 1.5vw);
  direction: rtl;
  max-width: 40vw;
  user-select: none;
  font-variant-numeric: tabular-nums;
}

#event-log .ev {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0.15em 0;
}

.dot {
  display: inline-block;
  width: 0.6em;
  height: 0.6em;
  border-radius: 50%;
  margin-inline-end: 0.3em;
  vertical-align: middle;
}

.dot-red    { background: #d50000; }
.dot-yellow { background: #f9a825; }
.dot-yellow_orange { background: #ffab00; }
.dot-green  { background: #00c853; }
.dot-gray   { background: #9e9e9e; }

.ev-time {
  direction: ltr;
  unicode-bidi: isolate;
  opacity: 0.7;
  margin-inline-end: 0.4em;
}

/* --- No-city prompt --- */
#no-city {
  display: none;
  text-align: center;
  padding: 2em;
}

#no-city h1 {
  font-size: clamp(1.5rem, 5vmin, 6vw);
  margin-bottom: 0.5em;
}

#no-city p {
  font-size: clamp(1rem, 2.5vmin, 3vw);
  margin-bottom: 0.3em;
  opacity: 0.85;
}

#no-city a {
  color: #fff;
  text-decoration: underline;
  font-size: clamp(1rem, 2.5vmin, 3vw);
}

/* --- Session expired overlay --- */
#expired-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: #212121;
  color: #fff;
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  cursor: pointer;
}

#expired-overlay h1 {
  font-size: clamp(1.5rem, 5vmin, 6vw);
  margin-bottom: 0.5em;
}

#expired-overlay p {
  font-size: clamp(1rem, 2.5vmin, 3vw);
  opacity: 0.7;
}

/* --- Missed-us explanation --- */
#missed-us-info {
  display: none;
  font-size: clamp(0.65rem, 1.6vmin, 2vw);
  opacity: 0.85;
  margin-top: 0.5em;
  text-shadow: 0 1px 4px rgba(0,0,0,0.25);
  max-width: min(600px, 80vw);
  line-height: 1.5;
}
#missed-us-info .mu-detail {
  opacity: 0.7;
  font-size: 0.9em;
  margin-top: 0.3em;
}

/* --- City input bar --- */
#city-form {
  margin-top: 1.5em;
  display: flex;
  justify-content: center;
  gap: 0.5em;
}
#city-input {
  font-size: clamp(1rem, 2.5vmin, 3vw);
  padding: 0.4em 0.8em;
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 8px;
  background: rgba(255,255,255,0.15);
  color: #fff;
  direction: rtl;
  outline: none;
  width: min(300px, 60vw);
}
#city-input::placeholder { color: rgba(255,255,255,0.5); }
#city-input:focus { border-color: #fff; }
#city-go {
  font-size: clamp(1rem, 2.5vmin, 3vw);
  padding: 0.4em 1em;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.3);
  color: #fff;
  cursor: pointer;
}
#city-go:hover { background: rgba(255,255,255,0.5); }
</style>
</head>
<body>

<div id="session-banner">⚠ תוקף הפעלה יפוג מחר — לחצו בכל מקום כדי להאריך</div>
<div id="conn-warning"></div>

<div id="center">
  <div id="status-text"></div>
  <div id="missed-us-info"></div>
  <div id="clock"><span id="clock-main"></span><span id="clock-seconds"></span></div>
</div>

<div id="city-label"></div>
<div id="event-log"></div>

<div id="no-city">
  <h1>הזינו שם עיר</h1>
  <form id="city-form" onsubmit="return false;">
    <input id="city-input" type="text" placeholder="לדוגמה: בית שמש" autocomplete="off" />
    <button id="city-go" type="submit">&#x25B6;</button>
  </form>
  <p dir="ltr" style="direction:ltr; margin-top:1em; opacity:0.6">or add <code>?city=YourCity</code> to the URL</p>
</div>

<div id="expired-overlay">
  <h1>הפעלה פגה — לחצו לטעינה מחדש</h1>
  <p>Session expired — tap to reload</p>
</div>

<script>
(function () {
  "use strict";

  // ── Constants ──────────────────────────────────────────────
  var RT_TO_HIST = { 1: 1, 3: 7, 4: 9, 5: 11, 6: 2, 7: 12, 13: 10 };
  var HIST_ALERT_CATEGORIES = new Set([1, 2, 3, 4, 7, 8, 9, 10, 11, 12]);
  var HIST_END_CATEGORY = 13;
  var HIST_PRE_ALERT_CATEGORY = 14;
  var RT_MESSAGE_CATEGORY = 10;
  var PRE_ALERT_WORD = "\u05D1\u05D3\u05E7\u05D5\u05EA";   // בדקות
  var END_WORD = "\u05D4\u05E1\u05EA\u05D9\u05D9\u05DD";     // הסתיים

  var ALERT = "alert";
  var PRE_ALERT = "pre_alert";
  var END = "end";

  var ALERT_EXPIRY_MIN = 180;
  var PRE_ALERT_EXPIRY_MIN = 20;
  var DEDUP_WINDOW_SEC = 180;

  var POLL_INTERVAL = 5000;
  var MAX_EVENTS = 10;
  var SESSION_MAX_MS = 7 * 24 * 60 * 60 * 1000;
  var SESSION_WARN_MS = 6 * 24 * 60 * 60 * 1000;
  var STALE_THRESHOLD_SEC = 60;
  var LS_KEY = "oref_lastActivity";

  // ── DOM refs ───────────────────────────────────────────────
  var elBody = document.body;
  var elCenter = document.getElementById("center");
  var elStatus = document.getElementById("status-text");
  var elMissedUsInfo = document.getElementById("missed-us-info");
  var elClockMain = document.getElementById("clock-main");
  var elClockSec = document.getElementById("clock-seconds");
  var elCityLabel = document.getElementById("city-label");
  var elEventLog = document.getElementById("event-log");
  var elNoCity = document.getElementById("no-city");
  var elConnWarn = document.getElementById("conn-warning");
  var elBanner = document.getElementById("session-banner");
  var elExpired = document.getElementById("expired-overlay");

  // ── State ──────────────────────────────────────────────────
  var city = "";
  var currentRecord = null;
  var eventLog = [];
  var failCount = 0;
  var lastRtKeys = new Set();
  var pollTimer = null;
  var sessionExpired = false;
  var cohortCities = new Set();
  var sirenCohortCities = new Set();
  var sirenCohortStableSince = null;
  var stableThresholdMs = null;      // null = no data, disable missed-us
  var thresholdsData = null;
  var lastThresholdFetch = 0;
  var firstPoll = true; // on first poll, replay history to rebuild event log

  // ── Parse city from query string ───────────────────────────
  function getCity() {
    var params = new URLSearchParams(window.location.search);
    return (params.get("city") || "").trim();
  }

  function getMissedUsOverride() {
    var params = new URLSearchParams(window.location.search);
    var v = params.get("missedus");
    return v ? parseInt(v, 10) : null;
  }

  function setsEqual(a, b) {
    if (a.size !== b.size) return false;
    var iter = a.values();
    var next = iter.next();
    while (!next.done) {
      if (!b.has(next.value)) return false;
      next = iter.next();
    }
    return true;
  }

  // Function app URL for API calls that need server-side processing
  var FUNC_API = "https://orefalert-func.azurewebsites.net/api";

  function fetchThresholds() {
    fetch("/api/thresholds.json")
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (!data) return;
        // Ignore stale thresholds (>2 days old)
        if (data.updated) {
          var age = Date.now() - new Date(data.updated).getTime();
          if (age > 2 * 24 * 60 * 60 * 1000) {
            stableThresholdMs = null;
            lastThresholdFetch = Date.now();
            return;
          }
        }
        thresholdsData = data;
        var override = getMissedUsOverride();
        if (override !== null) {
          stableThresholdMs = override * 1000;
        } else if (data.cities && data.cities[city]) {
          stableThresholdMs = data.cities[city].stable_seconds * 1000;
        } else {
          stableThresholdMs = null;
        }
        lastThresholdFetch = Date.now();
      })
      .catch(function() { /* ignore */ });
  }

  function registerCity() {
    fetch(FUNC_API + "/register?city=" + encodeURIComponent(city)).catch(function() {});
  }

  // ── Classification logic ───────────────────────────────────

  function classifyRealtime(cat, title) {
    if (cat === RT_MESSAGE_CATEGORY) {
      if (title.indexOf(PRE_ALERT_WORD) !== -1) {
        return { type: PRE_ALERT, histCat: HIST_PRE_ALERT_CATEGORY };
      }
      if (title.indexOf(END_WORD) !== -1) {
        return { type: END, histCat: HIST_END_CATEGORY };
      }
      return { type: ALERT, histCat: RT_TO_HIST[cat] || cat };
    }
    var histCat = RT_TO_HIST[cat];
    if (histCat === undefined) return { type: null, histCat: null };
    if (HIST_ALERT_CATEGORIES.has(histCat)) {
      return { type: ALERT, histCat: histCat };
    }
    return { type: null, histCat: null };
  }

  function classifyHistory(cat) {
    if (cat === HIST_END_CATEGORY) return END;
    if (cat === HIST_PRE_ALERT_CATEGORY) return PRE_ALERT;
    if (HIST_ALERT_CATEGORIES.has(cat)) return ALERT;
    return null;
  }

  function makeRecord(type, category, title, timeSec) {
    var expiryMs = null;
    if (type === ALERT) {
      expiryMs = timeSec * 1000 + ALERT_EXPIRY_MIN * 60 * 1000;
    } else if (type === PRE_ALERT) {
      expiryMs = timeSec * 1000 + PRE_ALERT_EXPIRY_MIN * 60 * 1000;
    }
    return { type: type, category: category, title: title, time: timeSec, expiryMs: expiryMs };
  }

  function shouldUpdate(newRec, curRec) {
    if (curRec === null) return true;
    if (newRec.type === PRE_ALERT && curRec.type === ALERT) return false;
    if (newRec.type === END) return newRec.time > curRec.time;
    if (newRec.time <= curRec.time) return false;
    if (newRec.category === curRec.category && (newRec.time - curRec.time) <= DEDUP_WINDOW_SEC) {
      return false;
    }
    return true;
  }

  function removeExpired() {
    if (currentRecord && currentRecord.expiryMs !== null && Date.now() > currentRecord.expiryMs) {
      var endRec = makeRecord(END, HIST_END_CATEGORY, "פג תוקף", Math.floor(Date.now() / 1000));
      currentRecord = endRec;
      cohortCities = new Set();
      sirenCohortCities = new Set();
      sirenCohortStableSince = null;
      addEvent("green", "פג תוקף התראה", "SYS", true);
    }
  }

  function getColor(rec) {
    if (!rec) return "green";
    if (rec.type === ALERT) return "red";
    if (rec.type === PRE_ALERT) {
      if (stableThresholdMs !== null &&
          sirenCohortCities.size > 0 && sirenCohortStableSince !== null &&
          (Date.now() - sirenCohortStableSince) >= stableThresholdMs) {
        return "yellow_orange";
      }
      return "yellow";
    }
    return "green";
  }

  // ── Event log ──────────────────────────────────────────────

  function addEvent(dotColor, title, source, causedChange) {
    if (!causedChange) return; // only log state-changing events
    var now = new Date();
    var hh = String(now.getHours()).padStart(2, "0");
    var mm = String(now.getMinutes()).padStart(2, "0");
    eventLog.unshift({
      dotColor: dotColor,
      time: hh + ":" + mm,
      title: title,
      source: source
    });
    if (eventLog.length > MAX_EVENTS) eventLog.length = MAX_EVENTS;
    renderEventLog();
  }

  function renderEventLog() {
    var html = "";
    for (var i = 0; i < eventLog.length; i++) {
      var ev = eventLog[i];
      html += '<div class="ev">' +
        '<span class="dot dot-' + ev.dotColor + '"></span>' +
        '<span class="ev-time">' + ev.time + '</span>' +
        escapeHtml(ev.title) +
        '</div>';
    }
    elEventLog.innerHTML = html;
  }

  function escapeHtml(s) {
    var d = document.createElement("div");
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  function parseAlertDate(s) {
    // oref dates use space ("2026-03-31 16:15:08") not T — Firefox requires T
    return new Date(s.replace(" ", "T"));
  }

  // ── UI rendering ───────────────────────────────────────────

  var COLOR_MAP = {
    green:  { bg: "#00c853", label: "\u05D4\u05DB\u05DC \u05EA\u05E7\u05D9\u05DF" },        // הכל תקין
    yellow: { bg: "#f9a825", label: "\u05D4\u05EA\u05E8\u05D0\u05D4 \u05DE\u05D5\u05E7\u05D3\u05DE\u05EA" }, // התראה מוקדמת
    yellow_orange: { bg: "#ffab00", label: "\u05DB\u05E0\u05E8\u05D0\u05D4 \u05E2\u05D1\u05E8" }, // כנראה עבר
    red:    { bg: "#d50000", label: "!\u05D0\u05D6\u05E2\u05E7\u05D4" }                      // !אזעקה
  };

  var currentColor = null;

  function applyColor(color) {
    if (color === currentColor) return;
    currentColor = color;
    var info = COLOR_MAP[color];
    elBody.style.backgroundColor = info.bg;
    elStatus.textContent = info.label;
    // Show missed-us explanation only in yellow_orange state
    if (color === "yellow_orange") {
      var threshSec = Math.round(stableThresholdMs / 1000);
      var html = "\u05E2\u05E8\u05D9\u05DD \u05D0\u05D7\u05E8\u05D5\u05EA \u05D1\u05D0\u05D5\u05EA\u05D4 " +
        "\u05D4\u05EA\u05E8\u05E2\u05D4 \u05E7\u05D9\u05D1\u05DC\u05D5 \u05D0\u05D6\u05E2\u05E7\u05D5\u05EA, " +
        "\u05D0\u05DA " + city + " \u05DC\u05D0 \u05E7\u05D9\u05D1\u05DC\u05D4 \u05D1\u05DE\u05E9\u05DA " +
        threshSec + " \u05E9\u05E0\u05D9\u05D5\u05EA.";
      // ערים אחרות באותה התרעה קיבלו אזעקות, אך [city] לא קיבלה במשך N שניות.
      html += '<div class="mu-detail">';
      html += "Other cities in the same alert received sirens, but " + escapeHtml(city) +
        " did not for " + threshSec + " seconds.";
      html += "<br>The threshold is calibrated so that this indication is correct at least 95% of the time, " +
        "based on historical alert patterns for this city.";
      var ci = thresholdsData && thresholdsData.cities && thresholdsData.cities[city];
      if (ci) {
        var accuracy = ((1 - ci.fn_rate) * 100).toFixed(0);
        html += " (" + ci.events + " events analyzed, " + accuracy + "% accuracy)";
      }
      html += "</div>";
      elMissedUsInfo.innerHTML = html;
      elMissedUsInfo.style.display = "block";
    } else {
      elMissedUsInfo.style.display = "none";
    }
  }

  function updateClock() {
    var now = new Date();
    var hh = String(now.getHours()).padStart(2, "0");
    var mm = String(now.getMinutes()).padStart(2, "0");
    var ss = String(now.getSeconds()).padStart(2, "0");
    elClockMain.textContent = hh + ":" + mm;
    elClockSec.textContent = ":" + ss;
  }

  // ── Polling & processing ───────────────────────────────────

  function processState(state) {
    failCount = 0;

    // Check staleness
    if (state.updated_at) {
      var updatedMs = new Date(state.updated_at).getTime();
      var ageSec = (Date.now() - updatedMs) / 1000;
      if (ageSec > STALE_THRESHOLD_SEC) {
        showWarning("\u26A0 \u05E0\u05EA\u05D5\u05E0\u05D9\u05DD \u05DC\u05D0 \u05E2\u05D3\u05DB\u05E0\u05D9\u05D9\u05DD"); // ⚠ נתונים לא עדכניים
      } else {
        hideWarning();
      }
    }

    var prevColor = getColor(currentRecord);

    // Process real-time alerts
    var newRtKeys = new Set();
    if (Array.isArray(state.alerts)) {
      for (var i = 0; i < state.alerts.length; i++) {
        var a = state.alerts[i];
        var cat = parseInt(a.cat, 10);
        var title = a.title || "";
        var data = a.data || [];
        var rtKey = cat + "|" + title + "|" + data.join(",");
        newRtKeys.add(rtKey);

        if (lastRtKeys.has(rtKey)) continue; // dedup across polls

        var cityMatch = false;
        for (var j = 0; j < data.length; j++) {
          if (data[j] === city) { cityMatch = true; break; }
        }
        if (!cityMatch) continue;

        var cl = classifyRealtime(cat, title);
        if (cl.type === null) continue;

        var timeSec = Math.floor(Date.now() / 1000);
        var rec = makeRecord(cl.type, cl.histCat, title, timeSec);
        var changed = shouldUpdate(rec, currentRecord);
        if (changed) {
          currentRecord = rec;
        }

        // Cohort tracking on PRE_ALERT
        if (cl.type === PRE_ALERT) {
          var newCohort = new Set(data.filter(function(d) { return d !== city; }));
          if (!setsEqual(newCohort, cohortCities)) {
            cohortCities = newCohort;
            sirenCohortCities = new Set();
            sirenCohortStableSince = null;
          }
        }
        // Clear cohort when leaving PRE_ALERT
        if (cl.type !== PRE_ALERT && changed) {
          cohortCities = new Set();
          sirenCohortCities = new Set();
          sirenCohortStableSince = null;
        }

        addEvent(getColor(rec) === "green" ? "green" : getColor(rec) === "red" ? "red" : "yellow",
          title, "RT", changed);
      }
    }
    lastRtKeys = newRtKeys;

    // --- Pass 2: check if cohort cities have sirens ---
    if (cohortCities.size > 0 && currentRecord && currentRecord.type === PRE_ALERT) {
      if (Array.isArray(state.alerts)) {
        for (var p2 = 0; p2 < state.alerts.length; p2++) {
          var a2 = state.alerts[p2];
          var cat2 = parseInt(a2.cat, 10);
          var cl2 = classifyRealtime(cat2, a2.title || "");
          if (cl2.type !== ALERT) continue;

          var data2 = a2.data || [];
          for (var d2 = 0; d2 < data2.length; d2++) {
            if (cohortCities.has(data2[d2]) && !sirenCohortCities.has(data2[d2])) {
              sirenCohortCities.add(data2[d2]);
              sirenCohortStableSince = Date.now();
            }
          }
        }
      }

      // Check if we just transitioned to yellow_orange
      var missedUsColor = getColor(currentRecord);
      if (missedUsColor === "yellow_orange") {
        var lastEvt = eventLog.length > 0 ? eventLog[0] : null;
        if (!lastEvt || lastEvt.dotColor !== "yellow_orange") {
          addEvent("yellow_orange", "\u05DB\u05E0\u05E8\u05D0\u05D4 \u05E2\u05D1\u05E8", "SYS", true);
        }
      }
    }

    // Process history
    if (Array.isArray(state.history)) {
      for (var h = 0; h < state.history.length; h++) {
        var hist = state.history[h];
        var hData = hist.data || "";
        if (hData !== city) continue;

        var hCat = parseInt(hist.category || hist.cat, 10);
        var hType = classifyHistory(hCat);
        if (hType === null) continue;

        var hTime = 0;
        if (hist.alertDate) {
          hTime = Math.floor(parseAlertDate(hist.alertDate).getTime() / 1000);
        }
        var hTitle = hist.title || "";
        var hRec = makeRecord(hType, hCat, hTitle, hTime);
        var hChanged = shouldUpdate(hRec, currentRecord);
        if (hChanged) {
          currentRecord = hRec;
        }
        var hDotColor = getColor(hRec) === "red" ? "red" : getColor(hRec) === "yellow" ? "yellow" : "green";
        addEvent(hDotColor, hTitle || ("\u05E7\u05D8\u05D2\u05D5\u05E8\u05D9\u05D4 " + hCat), "HIST", hChanged);
      }
    }

    // Check expiry
    removeExpired();

    var newColor = getColor(currentRecord);
    applyColor(newColor);

    // On first load, rebuild last 30 min of history into event log
    if (firstPoll) {
      firstPoll = false;
      rebuildRecentHistory(state);
    }
  }

  function poll() {
    if (sessionExpired) return;

    // Re-fetch thresholds every 24h
    if (Date.now() - lastThresholdFetch > 24 * 60 * 60 * 1000) {
      fetchThresholds();
    }

    fetch("/api/state.json")
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (data) {
        processState(data);
      })
      .catch(function () {
        failCount++;
        if (failCount >= 3) {
          showWarning("\u26A0 \u05D0\u05D9\u05DF \u05D7\u05D9\u05D1\u05D5\u05E8"); // ⚠ אין חיבור
        }
      });
  }

  function showWarning(msg) {
    elConnWarn.textContent = msg;
    elConnWarn.style.display = "block";
  }

  function hideWarning() {
    elConnWarn.style.display = "none";
  }

  // ── Session timeout ────────────────────────────────────────

  function resetActivity() {
    try { localStorage.setItem(LS_KEY, String(Date.now())); } catch (e) {}
  }

  function getLastActivity() {
    try {
      var v = localStorage.getItem(LS_KEY);
      return v ? parseInt(v, 10) : Date.now();
    } catch (e) { return Date.now(); }
  }

  function checkSession() {
    if (sessionExpired) return;
    var elapsed = Date.now() - getLastActivity();

    if (elapsed >= SESSION_MAX_MS) {
      sessionExpired = true;
      if (pollTimer) clearInterval(pollTimer);
      elExpired.style.display = "flex";
      elExpired.addEventListener("click", function () { location.reload(); });
      return;
    }

    if (elapsed >= SESSION_WARN_MS) {
      elBanner.style.display = "block";
    } else {
      elBanner.style.display = "none";
    }
  }

  // ── Rebuild recent history into event log ───────────────────

  function rebuildRecentHistory(state) {
    if (!Array.isArray(state.history)) return;
    var historyWindowAgo = Date.now() - 3 * 60 * 60 * 1000;
    var relevant = [];
    for (var h = 0; h < state.history.length; h++) {
      var hist = state.history[h];
      if ((hist.data || "") !== city) continue;
      var hCat = parseInt(hist.category || hist.cat, 10);
      var hType = classifyHistory(hCat);
      if (hType === null) continue;
      var hTime = 0;
      if (hist.alertDate) {
        hTime = parseAlertDate(hist.alertDate).getTime();
      }
      if (hTime < historyWindowAgo) continue;
      relevant.push({ type: hType, cat: hCat, title: hist.title || "", timeMs: hTime });
    }
    // Sort oldest first so unshift produces correct order
    relevant.sort(function(a, b) { return a.timeMs - b.timeMs; });
    for (var r = 0; r < relevant.length; r++) {
      var ev = relevant[r];
      var dotColor = ev.type === ALERT ? "red" : ev.type === PRE_ALERT ? "yellow" : "green";
      var dt = new Date(ev.timeMs);
      var hh = String(dt.getHours()).padStart(2, "0");
      var mm = String(dt.getMinutes()).padStart(2, "0");
      eventLog.unshift({
        dotColor: dotColor,
        time: hh + ":" + mm,
        title: ev.title || ("\u05E7\u05D8\u05D2\u05D5\u05E8\u05D9\u05D4 " + ev.cat),
        source: "HIST"
      });
    }
    if (eventLog.length > MAX_EVENTS) eventLog.length = MAX_EVENTS;
    if (relevant.length > 0) renderEventLog();
  }

  // ── Init ───────────────────────────────────────────────────

  function init() {
    city = getCity();

    if (!city) {
      elBody.style.backgroundColor = "#424242";
      elCenter.style.display = "none";
      elCityLabel.style.display = "none";
      elEventLog.style.display = "none";
      elNoCity.style.display = "block";

      // City input form handler
      var cityForm = document.getElementById("city-form");
      var cityInput = document.getElementById("city-input");
      if (cityForm && cityInput) {
        cityForm.addEventListener("submit", function(e) {
          e.preventDefault();
          var val = cityInput.value.trim();
          if (val) {
            window.location.search = "?city=" + encodeURIComponent(val);
          }
        });
        cityInput.focus();
      }
      return;
    }

    // Show city label
    elCityLabel.textContent = city;

    // Fetch thresholds and register city
    fetchThresholds();
    registerCity();
    setInterval(registerCity, 24 * 60 * 60 * 1000);

    // Initial color
    applyColor("green");

    // Clock
    updateClock();
    setInterval(updateClock, 1000);

    // Session management
    resetActivity();
    ["click", "touchstart", "keypress"].forEach(function (evt) {
      document.addEventListener(evt, resetActivity, { passive: true });
    });
    setInterval(checkSession, 60000);

    // Start polling — first poll also rebuilds recent history
    poll();
    pollTimer = setInterval(poll, POLL_INTERVAL);
  }

  init();
})();
</script>
</body>
</html>
